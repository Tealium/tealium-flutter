name: tealium_firebase_example
description: Demonstrates how to use the tealium_firebase plugin.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  tealium_firebase:
    path: ../
  tealium:
    path: ../../../tealium/
  cupertino_icons: ^1.0.8

dependency_overrides:
  tealium:
    path: ../../../tealium/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
