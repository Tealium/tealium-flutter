name: tealium_firebase
description: A Flutter plugin for using Tealium's Firebase Remote Command with the Tealium Flutter Plugin.
version: 3.0.0
homepage: https://docs.tealium.com/platforms/flutter/

environment:
  sdk: '>=2.18.0 <4.0.0'
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  tealium: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.tealium.flutter.remotecommands.firebase
        pluginClass: TealiumFirebasePlugin
      ios:
        pluginClass: TealiumFirebasePlugin
