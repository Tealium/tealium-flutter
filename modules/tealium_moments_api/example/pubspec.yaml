name: tealium_moments_api_example
description: "Demonstrates how to use the tealium_moments_api plugin."
publish_to: 'none'

environment:
  sdk: '>=2.18.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  tealium_moments_api:
    path: ../
  tealium:
    path: ../../../tealium/
  cupertino_icons: ^1.0.8

dependency_overrides:
  tealium:
    path: ../../../tealium/

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
