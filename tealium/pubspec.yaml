name: tealium
description: A Flutter plugin for using Tealium's Android and iOS libraries.
version: 3.0.0
homepage: https://tealium.com/
documentation: https://docs.tealium.com/platforms/flutter/
repository: https://github.com/Tealium/tealium-flutter

environment:
  sdk: '>=2.18.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_lints: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.tealium
        pluginClass: TealiumPlugin
      ios:
        pluginClass: TealiumPlugin
